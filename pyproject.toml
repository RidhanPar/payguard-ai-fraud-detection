[tool.black]
line-length = 100
target-version = ["py310"]
include = "\\.pyi?$"
exclude = """
/(
    \\.git
  | \\.venv
  | venv
  | env
  | build
  | dist
  | data
  | models
  | reports
  | htmlcov
  | \\.ipynb_checkpoints
)/
"""

[tool.isort]
profile = "black"
line_length = 100
py_version = 310
skip = [
    ".git",
    ".venv",
    "venv",
    "env",
    "build",
    "dist",
    "data",
    "models",
    "reports",
    "htmlcov",
    ".ipynb_checkpoints",
]
known_first_party = ["src", "app"]

[tool.coverage.run]
source = ["src"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if not logger.handlers:",
]
