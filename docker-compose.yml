services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payguard-streamlit
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_ENV=production
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    restart: unless-stopped

  mlflow:
    image: python:3.10-slim
    container_name: payguard-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      sh -c "pip install mlflow &&
             mlflow server
             --host 0.0.0.0
             --port 5000
             --backend-store-uri /mlruns
             --default-artifact-root /mlruns"
    restart: unless-stopped
